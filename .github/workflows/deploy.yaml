name: Deploy via FTP

on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - deploy

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Publish project
      run: dotnet publish -c Release -o ./publish

    - name: Create app_offline.htm
      run: echo "App offline for deployment" > app_offline.htm

    - name: Upload app_offline.htm (stop app)
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: .
        server-dir: ${{ secrets.FTP_PATH }}

    - name: FTP Deploy published app
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish
        server-dir: ${{ secrets.FTP_PATH }}

    - name: Delete app_offline.htm
      run: rm app_offline.htm

    - name: Remove app_offline.htm from server (restart app)
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: .
        server-dir: ${{ secrets.FTP_PATH }}
        exclude: |
          **/*
        delete: true
