name: Deploy via FTP

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore RVSite/RVSite.csproj

    - name: Install dotnet-ef
      run: dotnet tool install --global dotnet-ef

    - name: Add dotnet tools to PATH
      run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Build
      run: dotnet build RVSite/RVSite.csproj --configuration Release --no-restore

    - name: Run tests
      run: dotnet test --no-build --verbosity normal

    - name: Clean publish folder
      run: rm -rf ${{ github.workspace }}/publish

    - name: Publish project
      run: dotnet publish RVSite/RVSite.csproj -c Release -o ${{ github.workspace }}/publish

    - name: Create offline folder and app_offline.htm
      run: |
        mkdir ${{ github.workspace }}/offline
        echo "App offline for deployment" > ${{ github.workspace }}/offline/app_offline.htm

    - name: Upload app_offline.htm
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ${{ github.workspace }}/offline/
        server-dir: ${{ secrets.FTP_PATH }}

    - name: FTP Deploy published app
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ${{ github.workspace }}/publish/
        server-dir: ${{ secrets.FTP_PATH }}

    - name: Delete app_offline.htm on server
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ${{ github.workspace }}/publish/
        server-dir: ${{ secrets.FTP_PATH }}
        exclude: |
          **/*
        delete: true
